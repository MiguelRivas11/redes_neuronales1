# ================================================================
# GitHub Actions: CI para el Proyecto de Chatbot
# Se ejecuta en cada push y Pull Request a cualquier rama
# ================================================================

name: CI — Pruebas del Chatbot

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ejecutar pruebas unitarias
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        
      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m nltk.downloader punkt stopwords punkt_tab
          
      - name: Ejecutar pruebas Semana 1
        run: python tests/test_s1.py
        
      - name: Ejecutar pruebas Semana 2
        run: python tests/test_s2.py
        
      - name: Ejecutar pruebas Semana 3
        run: python tests/test_s3.py
        
      # Las pruebas de MongoDB y LLM usan mocks para no
      # requerir conexion real en el entorno de CI
      - name: Resumen de cobertura
        run: |
          echo "Todas las pruebas unitarias pasaron correctamente."
          echo "Revisar los logs arriba para detalles por modulo."
